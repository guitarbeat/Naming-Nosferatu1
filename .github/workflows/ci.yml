name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.txt"
      - docs/**
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      FORCE_COLOR: 1
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.6"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repo Check
        run: pnpm run check

      - name: Build (Vite)
        run: pnpm run build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      FORCE_COLOR: 1
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.6"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test
